server:
  port: 8281
  servlet:
    context-path: /api/mono

spring:
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5451/erp_mono_db_dev}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  instance:
    instance-id: ${spring.application.name}:${random.uuid}
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka}

cors:
  allowed-origins: "*"
  allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"

logging:
  level:
    root: INFO
    org:
      springframework:
        security: DEBUG
        web: DEBUG
    web: debug
    com.hw.mono_microservice: DEBUG

